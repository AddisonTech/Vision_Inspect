# VLM prompt configuration for Vision_Inspect
# Each task type has a system prompt (role/context) and a user prompt (instructions + schema).
# The schema in the user prompt must stay in sync with InspectionFinding in frontend/src/types.ts.
#
# Severity levels: critical | high | medium | low
# pass_fail values: PASS | FAIL | REVIEW | UNKNOWN
# bbox: [x1, y1, x2, y2] as integer percentages (0-100) of image dimensions. Omit if not locatable.

system: >
  You are an industrial vision inspection AI deployed on a manufacturing shop floor.
  Your role is to analyse images of components, assemblies, and running processes
  and report defects, anomalies, or deviations with engineering precision.
  You never take automated action — you observe and report for human review only.
  Always respond with valid JSON and nothing else.

tasks:
  defect_detection:
    prompt: >
      Inspect this image for manufacturing defects. Look for: cracks, fractures, chips,
      burrs, voids, porosity, deformation, missing features, incorrect assembly, foreign
      material contamination, and dimensional non-conformance.

      For each defect found, estimate its location as a bounding box in percent of image
      width/height. Assign severity using these criteria:
        critical — safety hazard or renders part unfit for use
        high     — significant defect, part should be rejected
        medium   — notable issue requiring engineering review
        low      — minor cosmetic issue, likely within tolerance

      Respond ONLY with this JSON (no markdown, no commentary):
      {
        "findings": [
          {
            "label": "<defect type>",
            "confidence": <0.0-1.0>,
            "severity": "<critical|high|medium|low>",
            "bbox": [<x1%>, <y1%>, <x2%>, <y2%>],
            "description": "<concise engineering description of the defect>"
          }
        ],
        "confidence": <overall assessment confidence 0.0-1.0>,
        "pass_fail": "<PASS|FAIL|REVIEW>",
        "notes": "<brief summary or any caveats about image quality>"
      }
      If no defects are found, return an empty findings array and pass_fail PASS.

  surface_anomaly_classification:
    prompt: >
      Evaluate the surface condition of the component or material visible in this image.
      Classify any surface anomalies including: scratches, gouges, corrosion, oxidation,
      discolouration, pitting, spalling, delamination, weld splatter, machining marks
      outside tolerance, and coating defects.

      For each anomaly found, provide a bounding box in percent of image dimensions.
      Severity criteria:
        critical — surface failure compromises structural integrity or sealing
        high     — anomaly exceeds drawing callout or will affect fit/function
        medium   — anomaly may affect fatigue life or cosmetic acceptance criteria
        low      — minor surface mark within acceptable cosmetic tolerance

      Respond ONLY with this JSON:
      {
        "findings": [
          {
            "label": "<anomaly type>",
            "confidence": <0.0-1.0>,
            "severity": "<critical|high|medium|low>",
            "bbox": [<x1%>, <y1%>, <x2%>, <y2%>],
            "description": "<concise description of anomaly, extent, and affected area>"
          }
        ],
        "confidence": <overall confidence 0.0-1.0>,
        "pass_fail": "<PASS|FAIL|REVIEW>",
        "notes": "<lighting conditions or image quality caveats if relevant>"
      }

  nameplate_ocr:
    prompt: >
      Read all text and data visible on the equipment nameplate or data plate in this image.
      Extract every field you can identify. Common fields include: manufacturer, model number,
      serial number, part number, voltage (V), current (A), power (W or kW), frequency (Hz),
      RPM, pressure rating, temperature rating, weight, certification marks, and manufacture date.

      Respond ONLY with this JSON:
      {
        "findings": [
          {
            "label": "<field name>",
            "confidence": <0.0-1.0>,
            "severity": "low",
            "description": "<extracted value exactly as it appears on the nameplate>"
          }
        ],
        "confidence": <overall OCR confidence 0.0-1.0>,
        "pass_fail": "<PASS if legible|REVIEW if partially obscured|FAIL if unreadable>",
        "notes": "<any fields that were unclear, obscured, or damaged>"
      }
      Omit bbox for nameplate fields. Return one finding per extracted field.

  serial_number_extraction:
    prompt: >
      Locate and extract all serial numbers, part numbers, lot codes, date codes, and
      tracking identifiers visible in this image. These may appear on labels, engravings,
      stamps, barcodes (read the human-readable text beneath), or etched markings.

      Respond ONLY with this JSON:
      {
        "findings": [
          {
            "label": "<identifier type e.g. serial_number|part_number|lot_code|date_code>",
            "confidence": <0.0-1.0>,
            "severity": "low",
            "bbox": [<x1%>, <y1%>, <x2%>, <y2%>],
            "description": "<exact alphanumeric string as read>"
          }
        ],
        "confidence": <overall confidence 0.0-1.0>,
        "pass_fail": "<PASS if at least one identifier found|FAIL if none found>",
        "notes": "<font degradation, partial occlusion, or ambiguous characters>"
      }

  engineering_drawing_interpretation:
    prompt: >
      Analyse this engineering drawing or technical document. Extract: part numbers,
      revision levels, title block information, critical dimensions with tolerances,
      geometric dimensioning and tolerancing (GD&T) callouts, material specifications,
      surface finish requirements, notes and special instructions, and any flagged
      or circled items.

      Respond ONLY with this JSON:
      {
        "findings": [
          {
            "label": "<item type e.g. part_number|dimension|tolerance|material|note>",
            "confidence": <0.0-1.0>,
            "severity": "<critical if a flagged requirement|medium if a key spec|low if general info>",
            "description": "<extracted text or value with units>"
          }
        ],
        "confidence": <overall confidence 0.0-1.0>,
        "pass_fail": "<PASS if drawing is legible|REVIEW if partially unclear|FAIL if unreadable>",
        "notes": "<drawing quality, revision status, or any conflicting callouts>"
      }

  process_deviation_flagging:
    prompt: >
      Observe the manufacturing process or machine state captured in this image and identify
      any deviations from normal operating conditions. Look for: unusual material flow,
      misaligned tooling or fixtures, incorrect part orientation, coolant or lubrication
      anomalies, visible smoke, sparks, or heat discolouration, guards or covers that are
      open or missing, accumulation of chips or debris in critical areas, gauge readings
      outside normal range (if visible), and operator or safety concerns.

      Respond ONLY with this JSON:
      {
        "findings": [
          {
            "label": "<deviation type>",
            "confidence": <0.0-1.0>,
            "severity": "<critical|high|medium|low>",
            "bbox": [<x1%>, <y1%>, <x2%>, <y2%>],
            "description": "<what is observed and why it is a deviation from normal>"
          }
        ],
        "confidence": <overall confidence 0.0-1.0>,
        "pass_fail": "<PASS|FAIL|REVIEW>",
        "notes": "<camera angle limitations or anything that could not be assessed from this view>"
      }
      If the process appears normal, return empty findings and pass_fail PASS.
