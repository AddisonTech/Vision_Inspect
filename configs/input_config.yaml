input:
  mode: live_camera
  manual_upload:
    enabled: true
    accepted_formats: [jpg, jpeg, png, bmp, tiff, mp4, avi, mkv]
    max_file_size_mb: 50
  live_camera:
    enabled: true
    device_index: 0
    stream_url: ""
    # GigE Vision (Harvesters) — fill in cti_path to activate GigE mode.
    # gige_ip is the camera's ethernet IP.
    # cti_path must point to a GenTL producer .cti file.
    # Recommended free producer for Windows: mvIMPACT Acquire (Matrix Vision)
    #   .cti after install: C:/mvIMPACT Acquire/lib/x86_64/mvGenTLProducer.cti
    gige_ip: "169.254.69.245"
    cti_path: "C:/Program Files/Balluff/ImpactAcquire/bin/x64/mvGenTLProducer.cti"
    # TCP port our backend listens on for camera Data Output pushes.
    # Set this to match whatever port is configured in VS Creator's Data Output tool.
    keyence_output_port: 9876
    capture_width: 1280
    capture_height: 720
    fps: 30
    buffer_frames: 3
  scheduled_capture:
    enabled: false
    interval_seconds: 60
    duration_seconds: 5
  manual_trigger:
    enabled: true
    endpoint: /inspect
